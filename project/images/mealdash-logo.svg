<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8400C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Plate circle background -->
  <circle cx="40" cy="40" r="34" fill="url(#plateGrad)" />

  <!-- Plate inner ring -->
  <circle cx="40" cy="40" r="27" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>

  <!-- Fork -->
  <line x1="30" y1="22" x2="30" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="22" x2="27" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="22" x2="33" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Knife -->
  <line x1="50" y1="22" x2="50" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 22 Q56 28 50 38" fill="white" opacity="0.9"/>

  <!-- Dash speed lines -->
  <line x1="76" y1="30" x2="88" y2="30" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="40" x2="88" y2="40" stroke="#E8400C" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="50" x2="88" y2="50" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>

  <!-- wordmark: Meal -->
  <text x="95" y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-1">Meal</text>

  <!-- wordmark: Dash -->
  <text x="178" y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="900"
    fill="#E8400C"
    letter-spacing="-1">Dash</text>

  <!-- tagline -->
  <text x="96" y="66"
    font-family="Arial, sans-serif"
    font-size="10"
    fill="#ffffff"
    letter-spacing="2">ORDER FAST. EAT FRESH.</text>
</svg>
