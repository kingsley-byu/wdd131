<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit your review and rating for products, including feedback on features, durability, and design">
    <meta name="author" content="Osaruyi Kingsley Osawaru"> 
    <title>HTML form Product Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!--Css reference-->
    <link rel="stylesheet" href="styles/form-small.css">
    <link rel="stylesheet" href="styles/form-large.css">

    <!-- JavaScript reference -->
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="wf1">

            <div class="product-container">
                <label><strong>Product name</strong>*<select id="choice" name="subject" required>
                    <option value="" disabled selected>select a product...</option>
                </select>
                </label>
            </div>

            <label><strong>Overall Rating*</strong></label>
            <div class="star-option">
                <div>
                    <span>★</span>
                    <input type="radio" id="onestar" name="stars" value="1" required>
                    <label for="onestar"></label>
                </div>

                <div>
                    <span>★★</span>
                    <input type="radio" id="twostar" name="stars" value="2" required>
                    <label for="twostar"></label>
                </div>

                <div>
                    <span>★★★</span>
                    <input type="radio" id="threestar" name="stars" value="3" required>
                    <label for="threestar"></label>
                </div>

                <div>
                    <span>★★★★</span>
                    <input type="radio" id="fourstar" name="stars" value="4" required>
                    <label for="fourstar"></label>
                </div>

                <div>
                    <span>★★★★★</span>
                    <input type="radio" id="fivestar" name="stars" value="5" required>
                    <label for="fivestar"></label>
                </div>
            </div>

            <div id="dateInstalled">
                <label><strong>Date of Installation</strong><input type="date" id="installation" name="dateInstalled" value="date"></label>
            </div>

            <div class="checkbox-group">
                <p>Which features did you find useful in the product?<br>(Check all that apply)</p>
                <label><input type="checkbox" id="durable" name="durability" value="yes"> Durability</label>
                <label><input type="checkbox" id="ease" name="Ease" value="yes"> Ease of Use</label>
                <label><input type="checkbox" id="perform" name="performance" value="yes"> Performance</label>
                <label><input type="checkbox" id="design" name="design" value="yes"> Design</label>
            </div>

            <div class="text-field">
                <label><strong> Review(Optional)</strong><textarea name="review" value="review"></textarea></label>
            </div>
            <div class="yourName">
                <label><strong>Your Name(Optional)</strong><input type="text" id="name" name="name" value="name"></label>
            </div>

        
            <input class="submit-btn" type="submit" value="Post Review">
            

        </form>
    </main>
    <footer>
         <p>
        © <span id="currentYear"></span> ✨ Osaruyi Kingsley Osawaru ✨ Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>
    
</body>
</html>
